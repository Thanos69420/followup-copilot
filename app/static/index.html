<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Followup Copilot</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;max-width:980px;margin:24px auto;padding:0 12px}
    textarea,input,button{font:inherit}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}
    .card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}
    .small{font-size:12px;color:#666}
  </style>
</head>
<body>
  <h2>Followup Copilot — Approval UI</h2>
  <p><a href="/progress" target="_blank">Open Progress Board</a></p>
  <div class="row">
    <input id="token" placeholder="Bearer token" style="width:520px" />
    <button onclick="loadDrafts()">Load Drafts</button>
  </div>
  <div class="row">
    <button onclick="seedDemo()">Seed Demo Data</button>
    <button onclick="generate()">Generate Overdue Drafts</button>
    <button onclick="loadEvents()">Load Send Events</button>
    <button onclick="gmailConnect()">Connect Gmail</button>
    <button onclick="gmailStatus()">Gmail Status</button>
  </div>
  <pre id="gmail" class="small"></pre>

  <h3>Summary</h3>
  <pre id="summary" class="small"></pre>

  <h3>Drafts</h3>
  <div id="drafts"></div>

  <h3>Send Events</h3>
  <pre id="events" class="small"></pre>

<script>
const api = (path, opts={}) => {
  const t = document.getElementById('token').value.trim();
  const h = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if (t) h['Authorization'] = 'Bearer ' + t;
  return fetch(path, Object.assign({}, opts, {headers:h})).then(r=>r.json());
}

async function loadSummary(){
  const s = await api('/analytics/summary');
  document.getElementById('summary').textContent = JSON.stringify(s, null, 2);
}

async function seedDemo(){
  await api('/demo/seed', {method:'POST'});
  await loadSummary();
  await loadDrafts();
}

async function generate(){
  await api('/followups/generate?days=3', {method:'POST'});
  await loadSummary();
  await loadDrafts();
}

async function loadDrafts(){
  const rows = await api('/followups');
  const root = document.getElementById('drafts');
  root.innerHTML = '';
  rows.forEach(r=>{
    const el = document.createElement('div');
    el.className='card';
    el.innerHTML = `
      <div><b>${r.invoice_id}</b> → ${r.client_email}</div>
      <div class="small">urgency=${r.urgency} risk=${r.risk_score} status=${r.status} approved=${r.approved}</div>
      <div><b>${r.subject}</b></div>
      <pre>${r.body}</pre>
      <div class="row">
        <button data-id="${r.id}" data-a="approve">Approve</button>
        <button data-id="${r.id}" data-a="unapprove">Unapprove</button>
        <button data-id="${r.id}" data-a="send">Send Now</button>
      </div>
    `;
    root.appendChild(el);
  });

  root.querySelectorAll('button').forEach(btn=>btn.onclick = async () => {
    const id = Number(btn.dataset.id);
    const action = btn.dataset.a;
    if (action === 'approve') await api('/followups/approve', {method:'POST', body: JSON.stringify({draft_id:id, approved:true})});
    if (action === 'unapprove') await api('/followups/approve', {method:'POST', body: JSON.stringify({draft_id:id, approved:false})});
    if (action === 'send') await api('/followups/send', {method:'POST', body: JSON.stringify({draft_id:id})});
    await loadSummary();
    await loadDrafts();
  });
}

async function loadEvents(){
  const rows = await api('/events/send?limit=50');
  document.getElementById('events').textContent = JSON.stringify(rows, null, 2);
}

async function gmailConnect(){
  const r = await api('/auth/gmail/start');
  if (r.auth_url) window.open(r.auth_url, '_blank');
  document.getElementById('gmail').textContent = JSON.stringify(r, null, 2);
}

async function gmailStatus(){
  const r = await api('/auth/gmail/status');
  document.getElementById('gmail').textContent = JSON.stringify(r, null, 2);
}
</script>
</body>
</html>
