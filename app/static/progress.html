<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Followup Copilot — Progress</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;max-width:980px;margin:24px auto;padding:0 12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{border:1px solid #ddd;border-radius:10px;padding:12px}
    .done{color:#0a7}.wip{color:#b80}.todo{color:#888}
    .bar{height:12px;background:#eee;border-radius:999px;overflow:hidden}
    .fill{height:12px;background:#0a7}
    ul{margin:8px 0 0 18px}
    code{background:#f5f5f5;padding:2px 4px;border-radius:4px}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h2>Followup Copilot — Live Build Progress</h2>
  <p>Endpoints: <a href='/ui'>/ui</a> · <a href='/status'>/status</a> · <a href='/health'>/health</a> · <a href='/progress.json'>/progress.json</a></p>
  <div class='card'>
    <div id='pct'>Completion: --%</div>
    <div class='bar'><div id='fill' class='fill' style='width:0%'></div></div>
    <div id='updated' style='font-size:12px;color:#666;margin-top:8px'></div>
  </div>

  <div class='grid'>
    <div class='card'>
      <h3>Phase Status</h3>
      <ul id='phases'></ul>
    </div>
    <div class='card'>
      <h3>Recent Progress</h3>
      <ul id='changelog'></ul>
    </div>
  </div>

  <div class='card'>
    <h3>Next Milestones</h3>
    <ul id='next'></ul>
  </div>

<script>
(async () => {
  const d = await fetch('/progress.json').then(r => r.json());
  document.getElementById('pct').textContent = `Completion: ${d.completion_percent}%`;
  document.getElementById('fill').style.width = `${d.completion_percent}%`;
  document.getElementById('updated').textContent = `Last updated: ${d.updated_at_utc}`;

  const phases = document.getElementById('phases');
  d.phases.forEach(p => {
    const li = document.createElement('li');
    const cls = p.status === 'done' ? 'done' : (p.status === 'in_progress' ? 'wip' : 'todo');
    const icon = p.status === 'done' ? '✅' : (p.status === 'in_progress' ? '🟡' : '⚪');
    li.innerHTML = `<span class='${cls}'>${icon} ${p.name}</span>`;
    phases.appendChild(li);
  });

  const cl = document.getElementById('changelog');
  d.changelog.forEach(x => { const li = document.createElement('li'); li.textContent = x; cl.appendChild(li); });

  const nx = document.getElementById('next');
  d.next_5.forEach(x => { const li = document.createElement('li'); li.textContent = x; nx.appendChild(li); });
})();
</script>
</body>
</html>
